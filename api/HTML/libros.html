        <div class="p-10 space-y-8">

            <!-- Búsqueda y Filtros -->

                    </div>
                    <div>
                        <label class="block text-on-surface font-bold mb-2">Categoría</label>

                            <option value="No Ficción">No Ficción</option>
                            <option value="Ciencia">Ciencia</option>
                            <option value="Historia">Historia</option>
                            <option value="Tecnología">Tecnología</option>

    <script>
    let librosData = [];
    let libroEditando = null;

    window.addEventListener('load', cargarLibros);

    async function cargarLibros() {
        try {
            const response = await fetch('../libros.php?accion=listar');
            const resultado = await response.json();
            
            if (resultado.exito) { // ✅ corregido
                librosData = resultado.datos;
                mostrarLibros(librosData);
            }
        } catch (error) {
            console.error('Error al cargar libros:', error);
        }
    }

    function mostrarLibros(libros) {
        const tbody = document.getElementById('librosTableBody');
        tbody.innerHTML = '';

        libros.forEach(libro => {
            const fila = document.createElement('tr');
            fila.innerHTML = `
                <td>${libro.Titulo}</td>
                <td>${libro.Autor}</td>
                <td>${libro.ISBN || '-'}</td>
                <td>${libro.Editorial || '-'}</td>
                <td>${libro.Categoria || '-'}</td>
                <td>
                    <button onclick="editBook(${libro.ID})">Editar</button>
                    <button onclick="deleteBook(${libro.ID})">Eliminar</button>
                </td>
            `;
            tbody.appendChild(fila);
        });
    }

    async function editBook(id) {
        const response = await fetch(`../libros.php?accion=obtener&id=${id}`);
        const resultado = await response.json();

        if (resultado.exito) { // ✅ corregido
            libroEditando = resultado.datos;
            document.getElementById('libroId').value = resultado.datos.ID;
            document.getElementById('titulo').value = resultado.datos.Titulo;
            document.getElementById('autor').value = resultado.datos.Autor;
            document.getElementById('isbn').value = resultado.datos.ISBN;
            document.getElementById('paginas').value = resultado.datos.Paginas;
            document.getElementById('editorial').value = resultado.datos.Editorial;
            document.getElementById('categoria').value = resultado.datos.Categoria;
        }
    }

    async function deleteBook(id) {
        if (confirm('¿Desea eliminar este libro?')) {
            const response = await fetch(`../libros.php?accion=eliminar&id=${id}`, {
                method: 'DELETE'
            });
            const resultado = await response.json();

            if (resultado.exito) { // ✅ corregido
                alert(resultado.mensaje);
                cargarLibros();
            } else {
                alert(resultado.mensaje);
            }
        }
    }

    document.getElementById('bookForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const datos = {
            Titulo: document.getElementById('titulo').value,
            Autor: document.getElementById('autor').value,
            ISBN: document.getElementById('isbn').value,
            Paginas: parseInt(document.getElementById('paginas').value) || 0,
            Editorial: document.getElementById('editorial').value,
            Categoria: document.getElementById('categoria').value
        };

        try {
            let response;

            if (libroEditando) {
                datos.ID = libroEditando.ID;
                response = await fetch('../libros.php?accion=actualizar', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });
            } else {
                response = await fetch('../libros.php?accion=crear', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });
            }

            const resultado = await response.json();

            if (resultado.exito) { // ✅ corregido
                alert(resultado.mensaje);
                cargarLibros();
            } else {
                alert(resultado.mensaje);
            }

        } catch (error) {
            console.error(error);
        }
    });
    function openBookModal() {
        document.getElementById('bookModal').classList.add('show');
        document.getElementById('bookForm').reset();
        document.getElementById('libroId').value = '';
        libroEditando = null;
    }

    function closeBookModal() {
        document.getElementById('bookModal').classList.remove('show');
    }
</script>
